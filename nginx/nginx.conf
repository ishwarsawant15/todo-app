server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # --- React static app ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Cache hashed static assets aggressively
    location /static/js/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /static/css/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Django API ---
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django's own static (admin CSS/JS) ---
    # Served directly by nginx from a volume shared with the backend container,
    # instead of proxying through gunicorn, since it's just static files.
    location /django-static/ {
        alias /usr/share/nginx/django-static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
